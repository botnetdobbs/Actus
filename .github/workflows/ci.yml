name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run mypy
        run: uv run mypy app

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      SECRET_KEY: "ci-placeholder-secret-key-please-ignore"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Cache NLP/embedding models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            .venv/lib/python3.13/site-packages/en_core_web_lg
            .venv/lib/python3.13/site-packages/en_core_web_lg-*.dist-info
          key: models-v1-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Download spaCy model
        run: uv run python -c "import en_core_web_lg" || uv run python -m spacy download en_core_web_lg

      - name: Run tests
        run: uv run python -m pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
